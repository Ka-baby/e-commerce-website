<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopagram | Cart</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <header class="site-header">
        <div class="logo">Shopagram</div>
        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="products.html">Shop</a>
          <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        </nav>
      </header>
      <main class="content-area">
        <h1>Your Cart</h1>

        <div class="cart-layout">
          <div class="cart-items-list" id="cart-container">
            <p>Your cart is empty.</p>
          </div>

          <div class="cart-summary">
            <h2>Order Summary</h2>
            <p>Total: <span id="cart-total">0.00kr</span></p>
            <button class="btn checkout-btn">Procees to Checkout</button>
          </div>
        </div>
      </main>
      <footer class="site-footer">
        <p>2026 Shopagram. All rights reserved.</p>
      </footer>
    </div>
  </body>
</html>
